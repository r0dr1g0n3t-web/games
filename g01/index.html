<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abelha vs Besouro - Mobile Edition</title>
    <style>
        :root {
            --primary: #f1c40f;
            --accent: #3498db;
            --bg-dark: #121212;
            --glass: rgba(0, 0, 0, 0.7);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            background: #000;
            font-family: 'Segoe UI', system-ui, sans-serif;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }

        /* Container 9:16 (Mobile Viewport) */
        #viewport {
            position: relative;
            width: 100vw;
            height: calc(100vw * 16 / 9);
            max-width: 450px;
            max-height: 800px;
            background: #222;
            overflow: hidden;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none;
            flex-direction: column;
            align-items: center;
            z-index: 10;
            padding: 20px;
            background-size: cover;
            background-position: center;
        }

        .screen.active { display: flex; }

        /* Fallbacks de fundo caso as imagens não carreguem */
        #screen-home { background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('assets/g01-fundo-home.jpg'); }
        #screen-game { background-image: url('assets/g01-fundo.jpg'); background-color: #333; }
        #screen-msg { background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('assets/g01-fundo-final.jpg'); }

        #game-header {
            width: 100%;
            background: var(--glass);
            padding: 15px 10px;
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            border-bottom: 2px solid var(--primary);
            font-size: 0.9rem;
            font-weight: bold;
        }

        .obj {
            position: absolute;
            cursor: pointer;
            will-change: transform;
            z-index: 5;
            filter: drop-shadow(0 4px 4px rgba(0,0,0,0.3));
        }

        #ranking-container {
            background: var(--glass);
            border-radius: 15px;
            width: 90%;
            padding: 15px;
            margin-top: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .ranking-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .ranking-list li {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 0.85rem;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 80%;
            margin-top: auto;
            margin-bottom: 40px;
        }

        button {
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: var(--primary);
            color: #000;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: 0.2s;
        }

        button:active { transform: scale(0.95); }
        .btn-sec { background: #95a5a6; color: white; }

        h1 { font-size: 1.8rem; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); text-align: center; }
    </style>
</head>
<body>

<div id="viewport">
    
    <div id="screen-home" class="screen active">
        <h1 id="game-title">🐝 ABELHA vs <br>BESOURO 🪲</h1>
        
        <div id="ranking-container">
            <h3 style="margin:0 0 10px 0; text-align:center; color: var(--primary)">🏆 TOP 5 RANKING</h3>
            <ul id="home-ranking" class="ranking-list"></ul>
        </div>

        <div class="btn-group">
            <button onclick="gameEngine.start()">Iniciar Partida</button>
        </div>
    </div>

    <div id="screen-game" class="screen">
        <div id="game-header">
            <div>🍎 Vidas: <span id="lives">3</span></div>
            <div>⭐ Score: <span id="score">0</span></div>
            <div>🆙 Fase: <span id="level">1</span></div>
            <div>⏳ Tempo: <span id="time">20</span></div>
        </div>
        
        <div id="spawn-area" style="position:relative; width:100%; flex-grow:1;"></div>

        <div class="btn-group" style="flex-direction: row; margin-bottom: 20px;">
            <button class="btn-sec" style="flex:1" onclick="gameEngine.goToHome()">Home</button>
            <button style="flex:1" onclick="gameEngine.restart()">Reset</button>
        </div>
    </div>

    <div id="screen-msg" class="screen">
        <h2 id="final-status" style="font-size: 2.5rem; margin-top: 60px;">FIM</h2>
        <p style="font-size: 1.2rem;">Pontuação: <b id="final-score" style="color:var(--primary)">0</b></p>
        
        <div class="btn-group">
            <button onclick="gameEngine.start()">Jogar Novamente</button>
            <button class="btn-sec" onclick="gameEngine.goToHome()">Menu Principal</button>
        </div>
    </div>

</div>

<script>
'use strict';

const gameEngine = (() => {
    // Assets e Regras que virão do JSON
    let ASSETS = { bee: '', bug: '' };
    let initialState = { score: 0, lives: 3, level: 1, time: 20, isActive: false };
    
    let state = { ...initialState, ranking: JSON.parse(localStorage.getItem('game_ranking') || '[]') };
    let audioCtx = null;
    let gameInterval = null, spawnInterval = null;

    const loadConfig = async () => {
        try {
            const response = await fetch('game.json');
            const config = await response.json();
            
            // Mapeia imagens do JSON: assume-se [0] abelha, [1] besouro
            const path = config.assets.path;
            ASSETS.bee = path + config.assets.images[0];
            ASSETS.bug = path + config.assets.images[1];
            
            // Sincroniza regras do JSON
            initialState.lives = config.settings.initial_lives;
            initialState.time = config.settings.round_duration_seconds;
            
            // Atualiza título da Home
            document.getElementById('game-title').innerText = config.title;
            
            return true;
        } catch (err) {
            console.error("Erro ao carregar game.json. Verifique se o arquivo existe.", err);
            // Fallback para não quebrar o jogo
            ASSETS = { bee: 'assets/g01-abelha.jpg', bug: 'assets/g01-besouro.jpg' };
            return false;
        }
    };

    const initAudio = () => { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); };

    const playTone = (freq) => {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.1);
        osc.connect(g).connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    };

    const showScreen = (id) => {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'screen-home') renderRanking();
    };

    const renderRanking = () => {
        const list = document.getElementById('home-ranking');
        list.innerHTML = state.ranking.length > 0 
            ? state.ranking.map((r, i) => `<li><span>#${i+1} ${r.date}</span> <b>${r.score}</b></li>`).join('')
            : '<li style="justify-content:center">Nenhum recorde ainda</li>';
    };

    const spawn = () => {
        if (!state.isActive) return;
        const area = document.getElementById('spawn-area');
        const isBug = Math.random() > 0.5;
        const img = document.createElement('img');
        
        img.src = isBug ? ASSETS.bug : ASSETS.bee;
        img.className = 'obj';

        const baseSize = 60;
        const size = Math.floor(baseSize * ((Math.random() * 1.5) + 0.5));
        
        img.style.width = size + 'px';
        img.style.height = 'auto';
        img.style.left = Math.random() * (area.clientWidth - size) + 'px';
        img.style.top = Math.random() * (area.clientHeight - size) + 'px';

        const removeObj = () => { if (img.parentNode) area.removeChild(img); };

        img.onclick = (e) => {
            e.stopPropagation();
            if (isBug) { state.score += 2; playTone(600); }
            else { state.lives--; state.score = Math.max(0, state.score - 1); playTone(200); }
            updateUI();
            removeObj();
            if (state.lives <= 0) endGame('GAME OVER');
        };

        area.appendChild(img);
        setTimeout(removeObj, Math.max(1800 - (state.level * 200), 700));
    };

    const updateUI = () => {
        document.getElementById('score').textContent = state.score;
        document.getElementById('lives').textContent = state.lives;
        document.getElementById('level').textContent = state.level;
        document.getElementById('time').textContent = state.time;
    };

    const clearGameProcesses = () => {
        state.isActive = false;
        clearInterval(gameInterval);
        clearInterval(spawnInterval);
        document.getElementById('spawn-area').innerHTML = '';
    };

    const endGame = (msg) => {
        clearGameProcesses();
        state.ranking.push({ score: state.score, date: new Date().toLocaleDateString('pt-BR', {day:'2-digit', month:'2-digit'}) });
        state.ranking.sort((a,b) => b.score - a.score);
        state.ranking = state.ranking.slice(0, 5);
        localStorage.setItem('game_ranking', JSON.stringify(state.ranking));
        document.getElementById('final-status').textContent = msg;
        document.getElementById('final-score').textContent = state.score;
        showScreen('screen-msg');
    };

    const runLevel = () => {
        state.time = initialState.time; // Usa o tempo vindo do JSON
        updateUI();
        gameInterval = setInterval(() => {
            state.time--;
            updateUI();
            if (state.time <= 0) {
                state.level++;
                if (state.level > 5) endGame('VITÓRIA!');
                else { 
                    clearInterval(gameInterval); 
                    clearInterval(spawnInterval); 
                    runLevel(); 
                }
            }
        }, 1000);
        spawnInterval = setInterval(spawn, Math.max(850 - (state.level * 100), 300));
    };

    return {
        init: async () => {
            await loadConfig();
            gameEngine.goToHome();
        },
        start: () => {
            initAudio();
            clearGameProcesses();
            state = { ...state, ...initialState, isActive: true };
            updateUI();
            showScreen('screen-game');
            runLevel();
        },
        restart: () => gameEngine.start(),
        goToHome: () => {
            clearGameProcesses();
            state = { ...state, ...initialState, isActive: false };
            updateUI();
            showScreen('screen-home');
        }
    };
})();

// Inicialização agora espera o carregamento das configurações
window.onload = () => {
    gameEngine.init();
};
</script>
</body>
</html>
