<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogo Abelha vs Besouro</title>
<style>
body {
  margin: 0;
  font-family: Arial;
  text-align: center;
  background: #222;
  color: white;
}

#gameArea {
  position: relative;
  width: 100%;
  height: 70vh;
  overflow: hidden;
  background-size: cover;
}

.obj {
  position: absolute;
  cursor: pointer;
  transition: transform 0.2s;
}

.obj:active {
  transform: scale(0.8);
}

#ui {
  padding: 10px;
}

button {
  padding: 10px;
  margin: 5px;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<h2>🐝 Abelha vs Besouro 🪲</h2>

<div id="setup">
  <p>Escolha as imagens:</p>
  Fundo: <input type="file" id="bgInput"><br>
  Abelha: <input type="file" id="beeInput"><br>
  Besouro: <input type="file" id="bugInput"><br><br>
  <button onclick="startGame()">Iniciar Jogo</button>
</div>

<div id="ui" class="hidden">
  <p>Pontos: <span id="score">0</span> | Vidas: <span id="lives">3</span> | Fase: <span id="level">1</span> | Tempo: <span id="time">20</span></p>
</div>

<div id="gameArea"></div>

<div id="message"></div>

<script>
let bgImg, beeImg, bugImg;
let score = 0;
let lives = 3;
let level = 1;
let time = 20;
let gameInterval;
let spawnInterval;

function loadImage(input, callback) {
  const file = input.files[0];
  const reader = new FileReader();
  reader.onload = e => callback(e.target.result);
  reader.readAsDataURL(file);
}

function startGame() {
  loadImage(bgInput, img => {
    bgImg = img;
    loadImage(beeInput, img2 => {
      beeImg = img2;
      loadImage(bugInput, img3 => {
        bugImg = img3;

        document.getElementById("setup").classList.add("hidden");
        document.getElementById("ui").classList.remove("hidden");

        nextLevel();
      });
    });
  });
}

function nextLevel() {
  document.getElementById("message").innerHTML = "Fase " + level;
  setTimeout(() => {
    document.getElementById("message").innerHTML = "";
    startLevel();
  }, 1500);
}

function startLevel() {
  const gameArea = document.getElementById("gameArea");
  gameArea.style.backgroundImage = `url(${bgImg})`;

  time = 20;
  updateUI();

  gameInterval = setInterval(() => {
    time--;
    updateUI();
    if (time <= 0) {
      clearInterval(gameInterval);
      clearInterval(spawnInterval);
      level++;
      if (level > 5) {
        endGame("Você venceu!");
      } else {
        nextLevel();
      }
    }
  }, 1000);

  spawnInterval = setInterval(spawnObject, Math.max(800 - level * 100, 300));
}

function spawnObject() {
  const gameArea = document.getElementById("gameArea");

  let obj = document.createElement("img");
  obj.classList.add("obj");

  let isBug = Math.random() > 0.5;
  obj.src = isBug ? bugImg : beeImg;

  let size = Math.random() * 60 + 40;
  obj.style.width = size + "px";

  let x = Math.random() * (gameArea.clientWidth - size);
  let y = Math.random() * (gameArea.clientHeight - size);

  obj.style.left = x + "px";
  obj.style.top = y + "px";

  obj.onclick = () => {
    if (isBug) {
      score += 2;
      playSound(600);
    } else {
      score -= 1;
      lives--;
      playSound(200);
    }

    animateClick(obj);
    updateUI();

    if (lives <= 0) {
      endGame("Game Over");
    }

    obj.remove();
  };

  gameArea.appendChild(obj);

  setTimeout(() => {
    obj.remove();
  }, Math.max(2000 - level * 200, 800));
}

function animateClick(obj) {
  obj.style.transform = "scale(1.5)";
  obj.style.opacity = "0";
}

function updateUI() {
  document.getElementById("score").innerText = score;
  document.getElementById("lives").innerText = lives;
  document.getElementById("level").innerText = level;
  document.getElementById("time").innerText = time;
}

function endGame(msg) {
  clearInterval(gameInterval);
  clearInterval(spawnInterval);
  document.getElementById("message").innerHTML = msg + "<br><button onclick='location.reload()'>Reiniciar</button>";
}

function playSound(freq) {
  let ctx = new (window.AudioContext || window.webkitAudioContext)();
  let osc = ctx.createOscillator();
  osc.type = "square";
  osc.frequency.setValueAtTime(freq, ctx.currentTime);
  osc.connect(ctx.destination);
  osc.start();
  setTimeout(() => osc.stop(), 100);
}
</script>

</body>
</html>
