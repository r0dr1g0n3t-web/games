
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Turbo JS - Ultimate Racing</title>
    <style>
        :root {
            --primary: #e74c3c;
            --secondary: #2ecc71;
            --dark: #2c3e50;
            --light: #ecf0f1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        body {
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: white;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 100vh;
            background: #333;
            box-shadow: 0 0 50px rgba(0,0,0,0.5);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: #444;
        }

        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.7);
            z-index: 10;
        }

        .hidden { display: none !important; }

        .menu-card {
            background: var(--dark);
            padding: 2rem;
            border-radius: 15px;
            text-align: center;
            border: 4px solid var(--primary);
            width: 80%;
        }

        h1 { font-size: 2.5rem; margin-bottom: 1rem; color: var(--primary); text-transform: uppercase; italic: true; }

        .btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 15px;
            width: 100%;
            transition: transform 0.2s;
            font-weight: bold;
        }

        .btn:active { transform: scale(0.95); }

        .hud {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            pointer-events: none;
            display: flex;
            justify-content: space-between;
            z-index: 5;
        }

        .stat-box {
            background: rgba(0,0,0,0.6);
            padding: 8px 15px;
            border-radius: 5px;
            font-weight: bold;
            border-left: 4px solid var(--primary);
        }

        #nitro-bar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 10px;
            background: #555;
            border-radius: 5px;
            overflow: hidden;
        }

        #nitro-progress {
            width: 100%;
            height: 100%;
            background: #3498db;
            transition: width 0.1s;
        }

        .ranking-list {
            margin-top: 15px;
            text-align: left;
            font-size: 0.9rem;
        }

        .ranking-item {
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid #444;
            padding: 4px 0;
        }

        /* Mobile Controls */
        #controls {
            position: absolute;
            bottom: 20px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            padding: 0 20px;
            z-index: 5;
        }

        .ctrl-btn {
            width: 70px;
            height: 70px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
            user-select: none;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="hud">
        <div class="stat-box">FASE: <span id="level-val">1</span></div>
        <div class="stat-box">SCORE: <span id="score-val">0</span></div>
    </div>

    <div id="nitro-bar"><div id="nitro-progress"></div></div>

    <canvas id="gameCanvas"></canvas>

    <div id="start-screen" class="ui-overlay">
        <div class="menu-card">
            <h1>TURBO RACER</h1>
            <p>Use Setas ou WASD para dirigir.<br>Espaço para NITRO!</p>
            <button class="btn" onclick="startGame()">INICIAR CORRIDA</button>
            <div class="ranking-list" id="main-ranking"></div>
        </div>
    </div>

    <div id="game-over-screen" class="ui-overlay hidden">
        <div class="menu-card">
            <h1 style="color: white;">FIM DE JOGO</h1>
            <p>Sua Pontuação: <span id="final-score">0</span></p>
            <p>Fase Alcançada: <span id="final-level">1</span></p>
            <button class="btn" onclick="startGame()">TENTAR NOVAMENTE</button>
        </div>
    </div>

    <div id="controls" class="hidden">
        <div class="ctrl-btn" id="btn-left">◀</div>
        <div class="ctrl-btn" id="btn-nitro">🔥</div>
        <div class="ctrl-btn" id="btn-right">▶</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreVal = document.getElementById('score-val');
    const levelVal = document.getElementById('level-val');
    const nitroProgress = document.getElementById('nitro-progress');

    // Configuration
    const LANE_WIDTH = 80;
    const TOTAL_LANES = 4;
    const ROAD_WIDTH = LANE_WIDTH * TOTAL_LANES;
    let canvasW, canvasH;

    // Game State
    let gameActive = false;
    let score = 0;
    let level = 1;
    let speed = 5;
    let roadOffset = 0;
    let obstacles = [];
    let enemies = [];
    let nitro = 100;
    let isNitroActive = false;
    let frameCount = 0;

    // Player Object
    const player = {
        x: 0,
        y: 0,
        w: 50,
        h: 90,
        lane: 1,
        targetX: 0,
        color: '#e74c3c'
    };

    // Audio Context (Web Audio API)
    let audioCtx;
    function playSound(freq, duration, type = 'square', vol = 0.1) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        gain.gain.setValueAtTime(vol, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + duration);
    }

    // Initialization
    function init() {
        canvasW = canvas.width = canvas.parentElement.clientWidth;
        canvasH = canvas.height = canvas.parentElement.clientHeight;
        player.x = (canvasW / 2) - (player.w / 2);
        player.y = canvasH - 150;
        player.targetX = player.x;
        updateRankingDisplay();
        
        if ('ontouchstart' in window) {
            document.getElementById('controls').classList.remove('hidden');
        }
    }

    function startGame() {
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('game-over-screen').classList.add('hidden');
        gameActive = true;
        score = 0;
        level = 1;
        speed = 7;
        nitro = 100;
        obstacles = [];
        enemies = [];
        player.lane = 1;
        player.x = getLaneX(1);
        player.targetX = player.x;
        loop();
        playSound(200, 0.5, 'sawtooth');
    }

    function getLaneX(lane) {
        const roadStartX = (canvasW - ROAD_WIDTH) / 2;
        return roadStartX + (lane * LANE_WIDTH) + (LANE_WIDTH / 2) - (player.w / 2);
    }

    // Input Handling
    const keys = {};
    window.addEventListener('keydown', e => {
        keys[e.code] = true;
        if(e.code === 'Space') isNitroActive = true;
    });
    window.addEventListener('keyup', e => {
        keys[e.code] = false;
        if(e.code === 'Space') isNitroActive = false;
    });

    // Mobile Input
    document.getElementById('btn-left').ontouchstart = () => movePlayer(-1);
    document.getElementById('btn-right').ontouchstart = () => movePlayer(1);
    document.getElementById('btn-nitro').ontouchstart = () => isNitroActive = true;
    document.getElementById('btn-nitro').ontouchend = () => isNitroActive = false;

    function movePlayer(dir) {
        player.lane = Math.max(0, Math.min(TOTAL_LANES - 1, player.lane + dir));
        player.targetX = getLaneX(player.lane);
    }

    // Game Logic
    function update() {
        if (!gameActive) return;

        // Input
        if (keys['ArrowLeft'] || keys['KeyA']) { 
            player.targetX -= 8; 
        }
        if (keys['ArrowRight'] || keys['KeyD']) { 
            player.targetX += 8; 
        }

        // Keep player in bounds
        const roadStartX = (canvasW - ROAD_WIDTH) / 2;
        player.targetX = Math.max(roadStartX, Math.min(roadStartX + ROAD_WIDTH - player.w, player.targetX));
        
        // Smooth movement
        player.x += (player.targetX - player.x) * 0.2;

        // Nitro Logic
        let currentSpeed = speed;
        if (isNitroActive && nitro > 0) {
            currentSpeed *= 1.8;
            nitro -= 1.5;
            if (frameCount % 5 === 0) playSound(100 + Math.random()*50, 0.05, 'sawtooth', 0.05);
        } else {
            if (nitro < 100) nitro += 0.2;
            isNitroActive = false;
        }
        nitroProgress.style.width = nitro + '%';

        // Road movement
        roadOffset += currentSpeed;
        score += Math.floor(currentSpeed / 5);
        scoreVal.innerText = score;

        // Level Up & Difficulty
        if (score > level * 2000) {
            level++;
            speed += 1;
            levelVal.innerText = level;
            playSound(600, 0.3, 'sine');
        }

        // Spawn Enemies & Obstacles
        if (frameCount % Math.max(20, 60 - level * 2) === 0) {
            spawnEnemy();
        }

        // Update Entities
        enemies.forEach((en, index) => {
            en.y += currentSpeed - en.speed;
            
            // Collision Detection
            if (player.x < en.x + en.w &&
                player.x + player.w > en.x &&
                player.y < en.y + en.h &&
                player.y + player.h > en.y) {
                gameOver();
            }

            // Remove off-screen
            if (en.y > canvasH) enemies.splice(index, 1);
        });

        frameCount++;
    }

    function spawnEnemy() {
        const lane = Math.floor(Math.random() * TOTAL_LANES);
        const colors = ['#3498db', '#f1c40f', '#9b59b6', '#2ecc71'];
        enemies.push({
            x: getLaneX(lane),
            y: -100,
            w: 45,
            h: 85,
            speed: 2 + Math.random() * 3,
            color: colors[Math.floor(Math.random() * colors.length)]
        });
    }

    function draw() {
        ctx.clearRect(0, 0, canvasW, canvasH);

        const roadStartX = (canvasW - ROAD_WIDTH) / 2;

        // Draw Grass/Background
        ctx.fillStyle = '#27ae60';
        ctx.fillRect(0, 0, canvasW, canvasH);

        // Draw Road
        ctx.fillStyle = '#34495e';
        ctx.fillRect(roadStartX, 0, ROAD_WIDTH, canvasH);

        // Draw Lane Markings
        ctx.strokeStyle = 'rgba(255,255,255,0.5)';
        ctx.setLineDash([40, 40]);
        ctx.lineDashOffset = -roadOffset;
        ctx.lineWidth = 4;
        
        for (let i = 1; i < TOTAL_LANES; i++) {
            ctx.beginPath();
            ctx.moveTo(roadStartX + i * LANE_WIDTH, 0);
            ctx.lineTo(roadStartX + i * LANE_WIDTH, canvasH);
            ctx.stroke();
        }

        // Side Borders
        ctx.setLineDash([]);
        ctx.strokeStyle = '#ecf0f1';
        ctx.lineWidth = 6;
        ctx.strokeRect(roadStartX, -10, ROAD_WIDTH, canvasH + 20);

        // Draw Enemies
        enemies.forEach(en => drawCar(en.x, en.y, en.w, en.h, en.color));

        // Draw Player
        if (isNitroActive) {
            // Nitro flames effect
            ctx.fillStyle = '#f39c12';
            ctx.fillRect(player.x + 10, player.y + player.h, player.w - 20, 20 + Math.random() * 15);
        }
        drawCar(player.x, player.y, player.w, player.h, player.color, true);
    }

    function drawCar(x, y, w, h, color, isPlayer = false) {
        // Body
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.roundRect(x, y, w, h, 8);
        ctx.fill();

        // Windows
        ctx.fillStyle = '#222';
        ctx.fillRect(x + 5, y + 15, w - 10, 20); // Front
        ctx.fillRect(x + 5, y + 55, w - 10, 15); // Rear

        // Details (Lights)
        ctx.fillStyle = isPlayer ? '#f1c40f' : '#e74c3c';
        ctx.fillRect(x + 5, y + 5, 10, 5);
        ctx.fillRect(x + w - 15, y + 5, 10, 5);
        
        // Wheels
        ctx.fillStyle = '#000';
        ctx.fillRect(x - 4, y + 10, 6, 15);
        ctx.fillRect(x + w - 2, y + 10, 6, 15);
        ctx.fillRect(x - 4, y + h - 25, 6, 15);
        ctx.fillRect(x + w - 2, y + h - 25, 6, 15);
    }

    function gameOver() {
        gameActive = false;
        playSound(100, 0.8, 'sawtooth', 0.2);
        document.getElementById('game-over-screen').classList.remove('hidden');
        document.getElementById('final-score').innerText = score;
        document.getElementById('final-level').innerText = level;
        saveScore(score);
    }

    function saveScore(s) {
        let scores = JSON.parse(localStorage.getItem('turboRacerRanking') || '[]');
        scores.push({score: s, date: new Date().toLocaleDateString()});
        scores.sort((a, b) => b.score - a.score);
        scores = scores.slice(0, 5);
        localStorage.setItem('turboRacerRanking', JSON.stringify(scores));
        updateRankingDisplay();
    }

    function updateRankingDisplay() {
        const scores = JSON.parse(localStorage.getItem('turboRacerRanking') || '[]');
        const html = scores.map((s, i) => `
            <div class="ranking-item">
                <span>#${i+1} ${s.date}</span>
                <span>${s.score} pts</span>
            </div>
        `).join('') || '<p>Nenhum recorde ainda!</p>';
        document.getElementById('main-ranking').innerHTML = '<strong>TOP 5 RANKING:</strong>' + html;
    }

    function loop() {
        if (!gameActive) return;
        update();
        draw();
        requestAnimationFrame(loop);
    }

    window.addEventListener('resize', init);
    init();

</script>
</body>
</html>
