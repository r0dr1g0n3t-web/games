<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Math Flow Senior v2.1</title>
    <style>
        :root {
            --bg: #0f172a;
            --surface: #1e293b;
            --primary: #38bdf8;
            --accent: #818cf8;
            --error: #ef4444;
            --success: #22c55e;
            --text: #f8fafc;
            --item-h: 60px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', system-ui, sans-serif; }

        body {
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        header {
            padding: 1rem;
            background: var(--surface);
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #334155;
            z-index: 10;
        }

        .stats { font-weight: 800; font-family: monospace; font-size: 1.1rem; }
        
        button.ui-btn {
            padding: 0.6rem 1.2rem;
            cursor: pointer;
            background: var(--primary);
            border: none;
            border-radius: 6px;
            font-weight: bold;
            color: var(--bg);
        }

        #game-container {
            flex: 1;
            display: flex;
            position: relative;
            background: #020617;
        }

        .column {
            flex: 1;
            position: relative;
            overflow: hidden;
            border-right: 1px solid #334155;
        }

        .item {
            position: absolute;
            left: 10%;
            width: 80%;
            height: var(--item-h);
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--surface);
            border: 2px solid #334155;
            border-radius: 12px;
            cursor: pointer;
            user-select: none;
            transition: border-color 0.2s, background 0.3s, box-shadow 0.2s;
            font-size: 1.2rem;
            font-weight: bold;
            color: var(--text);
            touch-action: manipulation;
        }

        .item.selected { border-color: var(--primary); box-shadow: 0 0 20px var(--primary); background: #1e3a8a; }
        .item.error { border-color: var(--error); animation: shake 0.4s; }
        .item.fade-out { transform: scale(0) !important; opacity: 0; transition: 0.4s ease-out; pointer-events: none; }

        @keyframes shake {
            0%, 100% { margin-left: 0; }
            25% { margin-left: -10px; }
            75% { margin-left: 10px; }
        }

        #overlay {
            position: fixed;
            inset: 0;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
    </style>
</head>
<body>

    <header>
        <div class="stats">
            TIME: <span id="timer">0.0s</span> | 
            PAIRS: <span id="pairs-count">0/15</span>
        </div>
        <button class="ui-btn" onclick="location.reload()">Reset</button>
    </header>

    <main id="game-container">
        <div id="col-left" class="column"></div>
        <div id="col-right" class="column"></div>
    </main>

    <div id="overlay">
        <h1 style="font-size: 3rem; margin-bottom: 2rem; color: var(--primary);">MATH FLOW <small style="font-size: 1rem; vertical-align: middle;">v2.1</small></h1>
        <button class="ui-btn" style="padding: 1.5rem 3rem; font-size: 1.5rem;" onclick="game.start()">INICIAR ENGINE</button>
    </div>

<script>
'use strict';

const game = (() => {
    const CONFIG = {
        TOTAL_PAIRS: 15, // Reduzi para 15 para melhor visualização em mobile
        ITEM_HEIGHT: 60,
        MARGIN: 20,
        BASE_SPEED: 1.5
    };

    const state = {
        entities: [],
        leftSelected: null,
        rightSelected: null,
        startTime: 0,
        penalty: 0,
        matchedCount: 0,
        isRunning: false,
        lastTime: 0
    };

    const dom = {
        colLeft: document.getElementById('col-left'),
        colRight: document.getElementById('col-right'),
        timer: document.getElementById('timer'),
        count: document.getElementById('pairs-count'),
        overlay: document.getElementById('overlay'),
        container: document.getElementById('game-container')
    };

    // 1. Garantia de Dados: Toda pergunta TEM uma resposta
    function createDataset() {
        const pairs = [];
        const usedResults = new Set();

        while (pairs.length < CONFIG.TOTAL_PAIRS) {
            const a = Math.floor(Math.random() * 15) + 1;
            const b = Math.floor(Math.random() * 15) + 1;
            const op = Math.random() > 0.5 ? '+' : '-';
            const res = op === '+' ? a + b : a - b;

            if (!usedResults.has(res) && res > 0) {
                usedResults.add(res);
                pairs.push({
                    id: `pair_${pairs.length}`,
                    question: `${a} ${op} ${b}`,
                    answer: `${res}`
                });
            }
        }
        return pairs;
    }

    function init() {
        const data = createDataset();
        const containerH = dom.container.offsetHeight;
        
        // 3. Ajuste de Espaçamento: Cálculo dinâmico para não encavalar
        const step = (CONFIG.ITEM_HEIGHT + CONFIG.MARGIN);

        // Criar Entidades da Esquerda
        data.forEach((d, i) => {
            const el = createDOMElement(d.question, 'left', d.id);
            state.entities.push({
                id: d.id,
                side: 'left',
                el: el,
                y: i * step,
                active: true
            });
        });

        // Criar Entidades da Direita (Embaralhadas)
        const shuffled = [...data].sort(() => Math.random() - 0.5);
        shuffled.forEach((d, i) => {
            const el = createDOMElement(d.answer, 'right', d.id);
            state.entities.push({
                id: d.id,
                side: 'right',
                el: el,
                y: i * step,
                active: true
            });
        });
        
        dom.count.textContent = `0/${CONFIG.TOTAL_PAIRS}`;
    }

    function createDOMElement(text, side, matchId) {
        const btn = document.createElement('button');
        btn.className = 'item';
        btn.textContent = text;
        btn.dataset.side = side;
        btn.dataset.matchId = matchId;
        btn.addEventListener('pointerdown', onSelect);
        (side === 'left' ? dom.colLeft : dom.colRight).appendChild(btn);
        return btn;
    }

    function onSelect(e) {
        if (!state.isRunning) return;
        const el = e.currentTarget;
        const side = el.dataset.side;
        const matchId = el.dataset.matchId;

        if (side === 'left') {
            if (state.leftSelected) state.leftSelected.el.classList.remove('selected');
            state.leftSelected = { id: matchId, el };
        } else {
            if (state.rightSelected) state.rightSelected.el.classList.remove('selected');
            state.rightSelected = { id: matchId, el };
        }

        el.classList.add('selected');
        
        if (state.leftSelected && state.rightSelected) {
            if (state.leftSelected.id === state.rightSelected.id) {
                handleMatch(state.leftSelected.id);
            } else {
                handleError();
            }
        }
    }

    function handleMatch(id) {
        state.entities.filter(ent => ent.id === id).forEach(ent => {
            ent.active = false;
            ent.el.classList.add('fade-out');
        });
        state.matchedCount++;
        dom.count.textContent = `${state.matchedCount}/${CONFIG.TOTAL_PAIRS}`;
        state.leftSelected = null;
        state.rightSelected = null;

        if (state.matchedCount === CONFIG.TOTAL_PAIRS) {
            state.isRunning = false;
            setTimeout(() => alert(`MISSÃO CONCLUÍDA!\nTempo: ${dom.timer.textContent}`), 100);
        }
    }

    function handleError() {
        const l = state.leftSelected.el;
        const r = state.rightSelected.el;
        l.classList.add('error');
        r.classList.add('error');
        state.penalty += 2;

        setTimeout(() => {
            l.classList.remove('error', 'selected');
            r.classList.remove('error', 'selected');
        }, 400);

        state.leftSelected = null;
        state.rightSelected = null;
    }

    function loop(now) {
        if (!state.isRunning) return;
        
        const dt = (now - state.lastTime) / 16.67 || 1;
        state.lastTime = now;

        const h = dom.container.offsetHeight;
        const speed = CONFIG.BASE_SPEED * dt;

        state.entities.forEach(ent => {
            if (!ent.active) return;

            // Movimento direcional
            if (ent.side === 'left') {
                ent.y += speed;
                if (ent.y > h) ent.y = -CONFIG.ITEM_HEIGHT;
            } else {
                ent.y -= speed;
                if (ent.y < -CONFIG.ITEM_HEIGHT) ent.y = h;
            }

            ent.el.style.transform = `translateY(${ent.y}px)`;
        });

        const elapsed = ((performance.now() - state.startTime) / 1000) + state.penalty;
        dom.timer.textContent = elapsed.toFixed(1) + 's';

        requestAnimationFrame(loop);
    }

    return {
        start: () => {
            dom.overlay.style.display = 'none';
            init();
            state.isRunning = true;
            state.startTime = performance.now();
            state.lastTime = performance.now();
            requestAnimationFrame(loop);
        }
    };
})();
</script>
</body>
</html>
